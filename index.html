<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GastroLab - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="main-bg">

        <!-- CONTENEDOR CENTRAL -->
        <section class="hero" style="justify-content: center; text-align: center;">

            <div class="hero-text" style="max-width: 380px;">

                <!-- NOMBRE DEL RESTAURANTE -->
                <h1 style="font-size: 48px; margin-bottom: 10px;">GastroLab</h1>

                <h2 style="font-size: 20px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px;">
                    New Flavours
                </h2>

                <p style="margin-bottom: 30px;">
                    Gestiona tu restaurante con un sistema modular: menú, inventario, pedidos y más.
                </p>

                <!-- LOGIN CARD CENTRADO -->
                <div class="login-card">
                    <h4>Iniciar sesión</h4>

                    <form id="login-form">
                        <label for="email">Correo</label>
                        <input type="email" id="email" required>

                        <label for="password">Contraseña</label>
                        <input type="password" id="password" required>

                        <button type="submit" class="btn-primary">Entrar</button>
                    </form>
                </div>

            </div>

        </section>

    </div>

    <script src="js/login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GastroLab - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="main-bg">

        <!-- CONTENEDOR CENTRAL -->
        <section class="hero" style="
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding-top: 40px;
        ">

            <div class="hero-text" style="max-width: 420px;">

                <!-- NOMBRE DEL RESTAURANTE -->
                <h1 style="
                    font-size: 56px; 
                    margin-bottom: 5px; 
                    letter-spacing: 4px;
                    text-transform: uppercase;
                ">
                    GastroLab
                </h1>

                <h2 style="
                    font-size: 22px; 
                    letter-spacing: 6px; 
                    text-transform: uppercase; 
                    margin-bottom: 25px;
                    color: #ffb347;
                ">
                    New Flavours
                </h2>

                <p style="
                    margin-bottom: 35px; 
                    font-size: 15px; 
                    color: #ccc;
                ">
                    Gestiona tu restaurante con un sistema modular: menú, inventario, pedidos y más.
                </p>

                <!-- LOGIN CARD CENTRADO -->
                <div class="login-card" style="
                    margin: 0 auto;
                    padding: 30px;
                    width: 100%;
                    border-radius: 14px;
                    background: rgba(0,0,0,0.65);
                    backdrop-filter: blur(4px);
                ">
                    <h4 style="
                        font-size: 18px; 
                        margin-bottom: 15px; 
                        letter-spacing: 2px;
                    ">
                        Iniciar sesión
                    </h4>

                    <form id="login-form">

                        <label for="email">Usuario</label>
                        <input type="text" id="email" required>

                        <label for="password">Contraseña</label>
                        <input type="password" id="password" required>

                        <button type="submit" class="btn-primary" style="margin-top: 18px;">
                            Entrar
                        </button>
                    </form>

                </div>

            </div>

        </section>

    </div>

    <!-- REDIRECCIÓN SI YA HAY SESIÓN -->
    <script>
        if (localStorage.getItem("sesion") === "activa") {
            window.location.href = "menu.html";
        }
    </script>

    <!-- SCRIPTS -->
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/login.js"></script>

    
</body>
</html>

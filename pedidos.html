<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Realizar Pedido</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="pedido-container">

        <header class="pedido-header">
            <h1>Realizar Pedido</h1>
            <a href="menu.html" class="btn-primary">Volver</a>
        </header>

        <!-- DATOS DEL CLIENTE -->
        <div class="pedido-datos">
            <label>Nombre del cliente</label>
            <input type="text" id="cliente-nombre">

            <label>Teléfono</label>
            <input type="text" id="cliente-telefono">
        </div>

        <section id="lista-platillos" class="pedido-grid">
            <!-- Aquí se cargan los platillos -->
        </section>

        <div class="pedido-footer">
            <h2>Total: Q <span id="total">0</span></h2>
            <button id="btn-confirmar" class="btn-primary">Crear Pedido</button>
        </div>

    </div>

    <!-- Protección de sesión -->
    <script>
        if (localStorage.getItem("sesion") !== "activa") {
            window.location.href = "index.html";
        }
    </script>

    <!-- ORDEN CORRECTO (SIN MODULE) -->
    <script src="js/storage.js"></script>
    <script src="js/platillos.js"></script>
    <script src="js/pedidos.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Pedidos</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="menu-container">
        <header class="menu-header">
            <h1>Historial de Pedidos</h1>
            <a href="menu.html" class="btn-primary">Volver</a>
        </header>

        <section id="historial-lista" class="menu-grid"></section>
    </div>

    <!-- Protección de sesión -->
    <script>
        if (localStorage.getItem("sesion") !== "activa") {
            window.location.href = "index.html";
        }
    </script>
    
    <div id="modal-pago" class="modal" style="display:none;">
    <div class="modal-content">
        <h2>Registrar Pago</h2>

        <label>Método de Pago:</label>
        <select id="metodoPago">
            <option value="Efectivo">Efectivo</option>
            <option value="Tarjeta">Tarjeta</option>
            <option value="Transferencia">Transferencia</option>
            <option value="QR">QR</option>
        </select>

        <div class="modal-actions">
            <button class="btn-primary" id="btnConfirmarPago">Confirmar Pago</button>
            <button class="btn-danger" id="btnCancelarPago">Cancelar</button>
        </div>
    </div>
</div>


    <!-- SCRIPTS CORRECTOS -->
    <script src="js/storage.js"></script>
    <script src="js/historial.js"></script>

</body>
</html>

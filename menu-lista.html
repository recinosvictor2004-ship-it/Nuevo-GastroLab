<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú de Platillos</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="menu-container">

        <header class="menu-header">
            <h1>Menú de Platillos</h1>
            <div>
                <a href="menu.html" class="btn-primary">Volver</a>
                <button class="btn-primary" id="btn-agregar">Agregar Platillo</button>
            </div>
        </header>

        <section class="menu-grid">
            <!-- Aquí se cargan los platillos -->
        </section>

    </div>

    <!-- MODAL PARA EDITAR -->
    <div id="modal-editar" class="modal">
        <div class="modal-content">

            <h2>Editar Platillo</h2>

            <label>Nombre</label>
            <input type="text" id="edit-nombre">

            <label>Descripción</label>
            <input type="text" id="edit-descripcion">

            <label>Precio</label>
            <input type="number" id="edit-precio">

            <label>URL de Imagen</label>
            <input type="text" id="edit-imagen">

            <div class="modal-actions">
                <button id="btn-guardar-cambios" class="btn-primary">Guardar</button>
                <button id="btn-cerrar-modal" class="btn-danger">Cerrar</button>
            </div>

        </div>
    </div>

    <script>
        if (localStorage.getItem("sesion") !== "activa") {
            window.location.href = "index.html";
        }
    </script>

    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/menu-lista.js"></script>
    <script type="module" src="js/platillos.js"></script>
</body>
</html>

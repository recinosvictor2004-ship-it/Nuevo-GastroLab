<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú de Platillos</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="menu-container">

        <header class="menu-header">
            <h1>Menú de Platillos</h1>
            <div>
                <a href="menu.html" class="btn-primary">Volver</a>
                <button class="btn-primary" id="btn-agregar">Agregar Platillo</button>
            </div>
        </header>

        <section class="menu-grid">
            <!-- Aquí se cargan los platillos -->
        </section>

    </div>

    <!-- MODAL PARA CREAR / EDITAR PLATILLO -->
    <div id="modal-editar" class="modal">
        <div class="modal-content">

            <h2 id="modal-titulo">Editar Platillo</h2>

            <label>Nombre</label>
            <input type="text" id="edit-nombre">

            <label>Descripción</label>
            <input type="text" id="edit-descripcion">

            <label>Precio</label>
            <input type="number" id="edit-precio">

            <label>URL de Imagen</label>
            <input type="text" id="edit-imagen">

            <h3>Ingredientes</h3>

            <!-- LISTA DE INGREDIENTES -->
            <div id="ingredientes-lista"></div>

            <!-- FORMULARIO PARA AGREGAR INGREDIENTE -->
            <div class="ingrediente-form">
                <label>Insumo</label>
                <select id="ingrediente-insumo"></select>

                <label>Cantidad</label>
                <input type="number" id="ingrediente-cantidad" placeholder="Cantidad" min="0.01" step="0.01">

                <button class="btn-primary" id="btn-agregar-ingrediente">Agregar Ingrediente</button>
            </div>

            <div class="modal-actions">
                <button id="btn-guardar-cambios" class="btn-primary">Guardar</button>
                <button id="btn-cerrar-modal" class="btn-danger">Cerrar</button>
            </div>

        </div>
    </div>

    <!-- PROTECCIÓN DE SESIÓN -->
    <script>
        if (localStorage.getItem("sesion") !== "activa") {
            window.location.href = "index.html";
        }
    </script>

    <!-- ORDEN CORRECTO -->
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/platillos.js"></script>
    <script type="module" src="js/menu-lista.js"></script>

</body>
</html>
